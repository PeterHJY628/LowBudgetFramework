# TranOne default: supervised ResNet-18 on raw CIFAR-10, no seed labels (handled in run_tranone.py).
# No DINOv3 / Hugging Face dependency for the baseline experiment driver.

dataset:
  budget: 20000
  classifier_fitting_mode: from_scratch
  initial_points_per_class: 0
  classifier_batch_size: 64
  validation_split: 0.10

classifier:
  type: Resnet18

optimizer:
  type: NAdam
  lr: 0.001
  weight_decay: 0.0001

dataset_embedded:
  encoder_checkpoint: encoder_checkpoints/cifar10_27.03/model_seed1.pth.tar
  budget: 200
  classifier_fitting_mode: from_scratch
  initial_points_per_class: 0
  classifier_batch_size: 64

classifier_embedded:
  type: Linear

optimizer_embedded:
  type: NAdam
  lr: 0.001
  weight_decay: 1.0e-05

pretext_encoder:
  type: Resnet18
  feature_dim: 128

pretext_optimizer:
  type: SGD
  lr: 0.4
  nesterov: false
  weight_decay: 0.0001
  momentum: 0.9
  lr_scheduler: cosine
  lr_scheduler_decay: 0.1

pretext_clr_loss:
  temperature: 0.1

pretext_training:
  batch_size: 512
  epochs: 500
